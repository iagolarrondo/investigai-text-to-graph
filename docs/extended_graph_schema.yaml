  # ---------------------------------------------------------------------------
  # Sample multi-hop traversals enabled in the comprehensive graph
  # ---------------------------------------------------------------------------
  example_traversals:
    - name: "Provider paid into family bank account (Q47)"
      hops: 5
      path: "Claim --PROVIDES_CARE_ON-- Person(ICP) <-PAID_TO-- Payment --PAID_VIA--> BankAccount <--HOLD_BY-- Person --IS_FAMILY_MEMBER_OF--> Person(insured)"
      detects: "Provider receiving payment into a bank held by the claimant's family member."

    - name: "Manual high-charge cluster (Q45)"
      hops: 3
      path: "CareSession[SUBMISSION_MODE=Manual] --SESSION_FOR_CLAIM-- Claim <-BILLED_ON-- Invoice --HAS_CHARGE--> Charge"
      detects: "Manual sessions correlated with above-baseline hourly_rate or hours_billed."

    - name: "Cross-claim ICP pattern (Q39, Q49)"
      hops: 4
      path: "Person(ICP) --PROVIDES_CARE_ON--> Claim_A; same Person --PROVIDES_CARE_ON--> Claim_B; both --SESSION_FOR_CLAIM--> CareSession sets"
      detects: "Same ICP saturating multiple claims, pattern check across distance/manual/device anomalies."

    - name: "ICP-claimant address collision (Q37)"
      hops: 3
      path: "Person(ICP) --LOCATED_IN--> Address <--LOCATED_IN-- Person(insured) --IS_COVERED_BY--> Policy <-IS_CLAIM_AGAINST_POLICY-- Claim"
      detects: "Care provider lives at the same address as the policyholder."

    - name: "Trigger to remediation chain (Q34, Q36)"
      hops: 3
      path: "TriggerMetric --TRIGGERED--> ReviewCycle <--HAS_REVIEW_CYCLE-- Claim; ReviewCycle --HAS_REMEDIATION--> Remediation"
      detects: "Full audit trail from anomaly detection to recovery action."
