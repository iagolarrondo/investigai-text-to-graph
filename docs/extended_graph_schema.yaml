    - { from: Person,        edge: IS_POA_FOR,               to: Person }
    - { from: Person,        edge: IS_HIPAA_AUTHORIZED_FOR,  to: Person }
    - { from: Person,        edge: IS_FAMILY_MEMBER_OF,      to: Person }
    - { from: Person,        edge: PROVIDES_CARE_ON,         to: Claim }
    - { from: Person,        edge: EMPLOYED_BY,              to: Business }
